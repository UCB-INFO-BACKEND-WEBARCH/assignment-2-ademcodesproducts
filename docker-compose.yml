version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/taskdb
      - REDIS_URL=redis://redis:6379/0
      - FLASK_APP=app:create_app
    depends_on:
      - db
      - redis
    command: >
      sh -c "flask db upgrade && flask run --host=0.0.0.0"

  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/taskdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: python worker.py

volumes:
  postgres_data:
